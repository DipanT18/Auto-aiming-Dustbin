camera:
  index: 0
  width: 640
  height: 480
  fps: null

serial:
  port: /dev/ttyUSB0
  baud_rate: 115200
  timeout: 1.0

detection:
  blur: 5
  min_area: 400
  motion_threshold: 25

trajectory:
  history: 8
  horizon_s: 0.35

aim:
  center_x: 320
  center_y: 240
  pixels_to_pan_steps: -0.15
  pixels_to_tilt_steps: -0.15
  max_step_per_frame: 80
